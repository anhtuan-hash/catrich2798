<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <meta name="theme-color" content="#f7f8fd" />
    <title>Tổ chuyên môn · Brian English</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const key = 'department-v2-meetings';
        try {
          const raw = localStorage.getItem(key);
          if (!raw) return;
          const meetings = JSON.parse(raw);
          if (!Array.isArray(meetings)) return;
          const compatible = meetings.map((meeting) => {
            if (!meeting || typeof meeting !== 'object') return meeting;
            const agenda = Array.isArray(meeting.agenda) ? meeting.agenda : [];
            const actions = Array.isArray(meeting.actions)
              ? meeting.actions
              : agenda.map((item) => ({
                  id: item.id,
                  label: item.label || item.text || 'Nội dung họp',
                  owner: item.owner || meeting.chair || '',
                  due: item.due || '',
                  done: Boolean(item.done),
                }));
            return {
              ...meeting,
              date: meeting.date || meeting.dateISO || '',
              time: meeting.time || [meeting.start, meeting.end].filter(Boolean).join('–'),
              place: meeting.place || meeting.location || '',
              summary: meeting.summary || meeting.minutes || meeting.conclusions || 'Chưa cập nhật nội dung.',
              actions,
            };
          });
          localStorage.setItem(key, JSON.stringify(compatible));
        } catch (error) {
          console.warn('[Department] Không thể chuẩn hóa dữ liệu cuộc họp cũ.', error);
        }
      })();
    </script>
    <script type="module" src="../department-app/src/main.jsx"></script>
  </body>
</html>
