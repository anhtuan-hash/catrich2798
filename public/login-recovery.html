<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Khôi phục đăng nhập · Brian English</title>
  <style>
    :root{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#102235;background:#eef4fb}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px}
    main{width:min(620px,100%);background:#fffdf8;border:2px solid #17212b;border-radius:24px;padding:34px;box-shadow:10px 12px 0 rgba(23,33,43,.13)}
    .mark{width:54px;height:54px;display:grid;place-items:center;background:#f05a7e;color:white;border:2px solid #17212b;border-radius:14px;font-weight:900}
    h1{font-size:clamp(32px,6vw,56px);line-height:1;margin:22px 0 12px}
    p{font-size:18px;line-height:1.55;color:#52606d}
    #status{padding:14px 16px;border:2px solid #17212b;border-radius:14px;background:#e8f4ff;font-weight:800;color:#173b5f}
    button{margin-top:16px;min-height:48px;padding:10px 18px;border:2px solid #17212b;border-radius:12px;background:#17212b;color:white;font:inherit;font-weight:900;cursor:pointer}
  </style>
</head>
<body>
  <main>
    <div class="mark">BE</div>
    <h1>Đang khôi phục đăng nhập</h1>
    <p>Trang này xoá cache giao diện Brian và huỷ Service Worker cũ. Tài khoản, dữ liệu Supabase và tài liệu của bạn không bị xoá.</p>
    <div id="status" role="status">Đang làm sạch phiên trình duyệt…</div>
    <button id="retry" type="button" hidden>Mở trang đăng nhập riêng</button>
  </main>
  <script>
    (async () => {
      const status = document.getElementById('status');
      const retry = document.getElementById('retry');
      const goLogin = () => {
        const url = new URL('/auth.html', location.origin);
        url.searchParams.set('mode', 'login');
        url.searchParams.set('recovered', String(Date.now()));
        location.replace(url.toString());
      };
      retry.addEventListener('click', goLogin);
      try {
        status.textContent = 'Đang huỷ Service Worker cũ…';
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map((reg) => reg.unregister()));
        }
        status.textContent = 'Đang xoá cache giao diện Brian…';
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.filter((key) => key.startsWith('bes-')).map((key) => caches.delete(key)));
        }
        try {
          sessionStorage.removeItem('bes-auth-route-recovery-v12410');
          sessionStorage.removeItem('bes-ui-recovery-reload-v10832');
          sessionStorage.removeItem('bes-vite-preload-recovery-v1086');
        } catch {}
        status.textContent = 'Đã làm sạch. Đang mở trang đăng nhập riêng…';
        setTimeout(goLogin, 500);
      } catch (error) {
        status.textContent = 'Không thể tự động làm sạch hoàn toàn. Hãy bấm nút bên dưới.';
        retry.hidden = false;
      }
    })();
  </script>
</body>
</html>
