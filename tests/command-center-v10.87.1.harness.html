<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>V10.87.1 Command Center Visual Test</title>
  <style>
    :root { font-family: system-ui, sans-serif; }
    body { margin: 0; min-height: 100vh; background: #293241; color: white; }
    /* Deliberately hostile host styles: the command center must remain isolated. */
    button { background: #10213d !important; color: #eef5ff !important; border-radius: 0 !important; border: 4px solid #10213d !important; padding: 18px !important; font-size: 20px !important; box-shadow: inset 0 0 0 2px white !important; }
    input { background: #001122 !important; color: white !important; border: 4px solid red !important; }
    .host { padding: 42px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
    .host-card { min-height: 150px; padding: 20px; background: #334155; border-radius: 18px; }
  </style>
  <link rel="stylesheet" href="/bes-command-center-v10871.css">
</head>
<body data-role="admin">
  <main class="host">
    <a href="#/apps">Ứng dụng</a>
    <a href="#/library">Thư viện học liệu</a>
    <a href="#/tool/exam-studio">Exam Studio</a>
    <a href="#/tool/lesson-architect">Lesson Architect</a>
    <section class="host-card">Host application</section>
    <section class="host-card">Metro interface</section>
    <section class="host-card">Dark page background</section>
    <section class="host-card">Content</section>
    <p id="result">running</p>
  </main>
  <script defer src="/bes-command-center-v10871.js"></script>
  <script>
    window.addEventListener('load', function () {
      setTimeout(function () {
        if (window.BES_COMMAND_CENTER) window.BES_COMMAND_CENTER.open('search');
        setTimeout(function () {
          var shell = document.querySelector('.bescc-shell');
          var card = document.querySelector('.bescc-card');
          var closeButton = document.querySelector('.bescc-icon-button');
          var cardStyle = card ? getComputedStyle(card) : null;
          var closeStyle = closeButton ? getComputedStyle(closeButton) : null;
          var isolated = Boolean(
            cardStyle && cardStyle.backgroundColor === 'rgb(255, 255, 255)' &&
            closeStyle && parseFloat(closeStyle.borderTopWidth) <= 1.5 &&
            parseFloat(closeStyle.borderRadius) >= 10
          );
          var ok = Boolean(
            window.BES_COMMAND_CENTER &&
            window.BES_COMMAND_CENTER.version === '10.87.1' &&
            shell && card &&
            document.getElementById('bes-command-trigger') &&
            document.getElementById('bes-command-dock') &&
            document.getElementById('bes-command-overlay') &&
            isolated
          );
          document.body.setAttribute('data-result', ok ? 'passed' : 'failed');
          document.body.setAttribute('data-style-isolated', isolated ? 'true' : 'false');
          document.getElementById('result').textContent = ok ? 'passed' : 'failed';
        }, 450);
      }, 350);
    });
  </script>
</body>
</html>
