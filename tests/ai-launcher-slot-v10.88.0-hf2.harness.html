<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Launcher Slot Restore Harness</title>
  <link rel="stylesheet" href="../public/bes-ai-launcher-slot-v10882.css">
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:#eef4fb;font-family:system-ui,sans-serif;color:#183153}.top{height:86px;background:#fff;border-bottom:1px solid #dbe5f1;display:flex;align-items:center;justify-content:flex-end;padding:0 28px;gap:20px}.top button{padding:10px 16px}.page{padding:40px}.card{height:720px;background:white;border:1px solid #d8e4f2;border-radius:22px;padding:30px}.music{position:fixed;right:18px;bottom:18px;width:58px;height:58px;border-radius:50%;font-size:28px;background:#fff;border:2px solid #172033}.native-chat{position:fixed;right:18px;top:200px;width:58px;height:58px;border-radius:50%;background:#c43c63;color:white;border:0;opacity:0;pointer-events:none}.panel{position:fixed;right:18px;bottom:18px;width:480px;height:650px;background:#fff;border:1px solid #cad8e8;display:none}.panel.open{display:block}.panel header{height:64px;background:#1d5f9d;color:#fff;padding:20px}.panel button{float:right}
  </style>
</head>
<body>
  <div class="top"><button>♫ Nhạc nền</button><button id="ready">AI sẵn sàng</button></div>
  <main class="page"><div class="card"><h1>Trang cài đặt mô phỏng</h1><p>Nút nhạc tròn ở góc phải dưới phải biến mất. Bong bóng chat màu đỏ phải thay thế đúng vị trí đó.</p></div></main>
  <button class="music" aria-label="Mở trình phát nhạc">♫</button>
  <button class="native-chat chat-launcher" aria-label="Mở Brian AI">Chat</button>
  <section class="panel" role="dialog" aria-label="Brian AI"><header>Brian AI <button aria-label="Thu gọn Brian AI">−</button></header><textarea></textarea></section>
  <script>
    const panel=document.querySelector('.panel');
    const native=document.querySelector('.native-chat');
    const open=()=>{panel.classList.add('open');document.documentElement.setAttribute('data-bes-ai-chat-open','true')};
    native.addEventListener('click',open);document.getElementById('ready').addEventListener('click',open);
    panel.querySelector('button').addEventListener('click',()=>{panel.classList.remove('open');window.dispatchEvent(new CustomEvent('bes-ai-chat-closed'))});
  </script>
  <script src="../public/bes-ai-launcher-slot-v10882.js"></script>
</body>
</html>
