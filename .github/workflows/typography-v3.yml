name: Typography V3 Matrix

on:
  pull_request:
    paths:
      - 'src/ui-core/styles/**'
      - 'src/utils/bursReadability.js'
      - 'scripts/verify-v12.40.9-stability-speed.mjs'
      - 'tests/e2e/typography-v3.spec.js'
      - 'playwright.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/typography-v3.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: typography-v3-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  typography-matrix:
    name: 5 scales × 5 viewports × Home/Apps
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run BURS V3 release gate
        shell: bash
        run: |
          set -o pipefail
          node scripts/verify-v12.40.9-stability-speed.mjs 2>&1 | tee burs-release-gate.log

      - name: Install Chromium
        shell: bash
        run: |
          npx playwright install --with-deps chromium
          BROWSER_PATH="$(node --input-type=module -e "import { chromium } from '@playwright/test'; process.stdout.write(chromium.executablePath())")"
          test -x "$BROWSER_PATH"
          echo "BES_CHROMIUM_EXECUTABLE=$BROWSER_PATH" >> "$GITHUB_ENV"

      - name: Build production bundle
        run: npm run build

      - name: Run typography matrix
        run: npx playwright test tests/e2e/typography-v3.spec.js --project=chromium-desktop --reporter=line

      - name: Upload compact failure report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typography-v3-failure-contexts
          path: |
            burs-release-gate.log
            test-results/**/error-context.md
            test-results/**/test-failed-1.png
          if-no-files-found: ignore
          retention-days: 7
