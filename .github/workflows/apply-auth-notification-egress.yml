name: Apply auth and notification egress patch

on:
  push:
    branches:
      - fix/auth-notification-egress-round3
    paths:
      - .github/workflows/apply-auth-notification-egress.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/auth-notification-egress-round3
          fetch-depth: 0
      - name: Apply patch
        shell: bash
        env:
          PATCH_B64: 
        run: |
          printf '%s' "$PATCH_B64" | base64 -d | gzip -d > /tmp/auth-notification-egress.patch
          git apply --check /tmp/auth-notification-egress.patch
          git apply /tmp/auth-notification-egress.patch
          git rm .github/workflows/apply-auth-notification-egress.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/utils/auth.js src/services/runtime/core.js src/utils/userProfile.js src/utils/workHubDelivery.js src/components/GlobalWorkHubNotificationBridge.jsx
          git commit -m "Reduce auth and notification request churn"
          git push origin HEAD:fix/auth-notification-egress-round3
