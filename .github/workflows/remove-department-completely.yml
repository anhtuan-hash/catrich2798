name: Remove Department Workspace completely

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  remove-department:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout removal branch
        uses: actions/checkout@v4
        with:
          ref: agent/remove-department-completely
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Remove every old Department implementation
        run: node scripts/remove-department-completely.mjs

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Commit clean removal to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove the old Department Workspace completely"
          git push origin HEAD:agent/remove-department-completely

      - name: Remove one-time workflow from main
        run: |
          git fetch origin main
          git checkout -B main origin/main
          git rm .github/workflows/remove-department-completely.yml
          git commit -m "Remove one-time Department cleanup workflow"
          git push origin HEAD:main
