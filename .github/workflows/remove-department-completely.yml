name: Remove Department Workspace completely

on:
  push:
    branches:
      - agent/remove-department-completely
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-and-verify-removal:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout cleanup branch
        uses: actions/checkout@v4
        with:
          ref: agent/remove-department-completely
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply manual cleanup
        shell: bash
        run: |
          cat scripts/manual-department-cleanup/dashboardAggregator.b64.* | base64 -d > src/utils/dashboardAggregator.js
          node scripts/manual-department-cleanup/apply-dashboard-cleanup.mjs

      - name: Audit retired Department implementation
        shell: bash
        run: |
          node scripts/remove-department-completely.mjs | tee department-removal-audit.txt

      - name: Install dependencies
        run: npm ci

      - name: Build website
        shell: bash
        run: |
          npm run build 2>&1 | tee department-removal-build.txt

      - name: Create verified ZIP packages
        shell: bash
        run: |
          zip -qr Brian-English-Studio-Department-Removed-source.zip . \
            -x '.git/*' 'node_modules/*' 'dist/*' 'Brian-English-Studio-Department-Removed-*.zip'
          cd dist
          zip -qr ../Brian-English-Studio-Department-Removed-static.zip .
          cd ..
          sha256sum Brian-English-Studio-Department-Removed-*.zip > SHA256SUMS.txt

      - name: Upload verified manual package
        uses: actions/upload-artifact@v4
        with:
          name: Brian-English-Studio-Department-Removed-Verified
          path: |
            department-removal-audit.txt
            department-removal-build.txt
            Brian-English-Studio-Department-Removed-source.zip
            Brian-English-Studio-Department-Removed-static.zip
            SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30

      - name: Commit verified cleanup to branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/utils/dashboardAggregator.js src/pages/WorkDashboard.jsx src/styles/work-dashboard-v1167.css
          if git diff --cached --quiet; then
            echo "No cleanup changes to commit."
          else
            git commit -m "Finish manual Department removal and restore build"
            git push origin HEAD:agent/remove-department-completely
          fi
