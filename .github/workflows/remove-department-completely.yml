name: Remove Department Workspace completely

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-removal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Produce Department removal audit report
        shell: bash
        run: |
          set +e
          node scripts/remove-department-completely.mjs > department-removal-audit.txt 2>&1
          status=$?
          echo "AUDIT_EXIT_CODE=$status" >> "$GITHUB_ENV"
          cat department-removal-audit.txt
          exit 0

      - name: Upload removal audit report
        uses: actions/upload-artifact@v4
        with:
          name: department-removal-audit
          path: department-removal-audit.txt
          if-no-files-found: error

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Enforce removal audit
        shell: bash
        run: |
          if [ "${AUDIT_EXIT_CODE}" != "0" ]; then
            echo "Department removal audit failed. Download the department-removal-audit artifact for the exact remaining references."
            exit 1
          fi
          echo "Department removal audit passed."
