name: Apply Homeroom Integrity Fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/homeroom-integrity-fixes
          fetch-depth: 1
      - name: Apply staged patch when present
        shell: bash
        run: |
          set -euxo pipefail
          if ! compgen -G '.homeroom-patch/part-*' > /dev/null; then
            echo 'Patch already applied; nothing to do.'
            exit 0
          fi
          cat .homeroom-patch/part-* > /tmp/homeroom.patch.gz.b64
          test "$(wc -c < /tmp/homeroom.patch.gz.b64)" -eq 20768
          base64 --decode /tmp/homeroom.patch.gz.b64 > /tmp/homeroom.patch.gz
          gzip -t /tmp/homeroom.patch.gz
          gzip -d -c /tmp/homeroom.patch.gz > /tmp/homeroom.patch
          test "$(wc -c < /tmp/homeroom.patch)" -eq 68013
          cp .github/workflows/homeroom-build.yml /tmp/homeroom-build.yml
          patch -p1 --batch < /tmp/homeroom.patch
          cp /tmp/homeroom-build.yml .github/workflows/homeroom-build.yml
          rm -rf .homeroom-patch
          git config user.name "Brian Homeroom Fix Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Fix homeroom data integrity and restore gradebook"
          git push origin HEAD:agent/homeroom-integrity-fixes
