name: Apply Homeroom Integrity Fixes

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/homeroom-integrity-fixes
          fetch-depth: 1
      - name: Validate staged payload
        shell: bash
        run: |
          set -euxo pipefail
          cat .homeroom-patch/part-* > /tmp/homeroom.patch.gz.b64
          test "$(wc -c < /tmp/homeroom.patch.gz.b64)" -eq 20768
          base64 --decode /tmp/homeroom.patch.gz.b64 > /tmp/homeroom.patch.gz
          gzip -t /tmp/homeroom.patch.gz
          gzip -d -c /tmp/homeroom.patch.gz > /tmp/homeroom.patch
          test "$(wc -c < /tmp/homeroom.patch)" -eq 68013
      - name: Apply patch files
        shell: bash
        run: patch -p1 --batch < /tmp/homeroom.patch
      - name: Prepare clean commit
        shell: bash
        run: |
          rm -rf .homeroom-patch
          rm -f .github/workflows/apply-homeroom-integrity-fixes.yml
          git config user.name "Brian Homeroom Fix Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Fix homeroom data integrity and restore gradebook"
      - name: Push fixed branch
        shell: bash
        run: git push origin HEAD:agent/homeroom-integrity-fixes
