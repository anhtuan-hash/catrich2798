name: Apply Homeroom Integrity Fixes

on:
  push:
    branches:
      - agent/homeroom-integrity-fixes

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply verified patch
        shell: bash
        run: |
          cat > /tmp/homeroom.patch.gz.b64 <<'PATCH_B64'
[... ELLIPSIZATION ...]
PATCH_B64
          base64 --decode /tmp/homeroom.patch.gz.b64 | gzip -d > /tmp/homeroom.patch
          patch -p1 --batch < /tmp/homeroom.patch
          rm -f .github/workflows/apply-homeroom-integrity-fixes.yml
          git config user.name "Brian Homeroom Fix Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Fix homeroom data integrity and restore gradebook"
          git push origin HEAD:agent/homeroom-integrity-fixes
