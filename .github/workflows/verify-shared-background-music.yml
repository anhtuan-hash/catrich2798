name: Verify Admin shared background music

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/admin-shared-background-music-20260724
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Finalize shared music integration
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import json

          player = Path('src/components/GlobalMusicPlayer.jsx')
          text = player.read_text(encoding='utf-8')
          anchor = "import './GlobalMusicNavigationPopover.css';\n"
          addition = "import './GlobalMusicShared.css';\n"
          if addition not in text:
              if anchor not in text:
                  raise SystemExit('Global music CSS import anchor not found')
              text = text.replace(anchor, anchor + addition, 1)
          player.write_text(text, encoding='utf-8')

          for name in ('public/version.json', 'public/release-manifest.json'):
              path = Path(name)
              data = json.loads(path.read_text(encoding='utf-8'))
              data['sharedBackgroundMusic'] = True
              data['sharedBackgroundMusicAdminUpload'] = True
              data['sharedBackgroundMusicRealtime'] = True
              data['sharedBackgroundMusicTeacherReadOnly'] = True
              data['sharedBackgroundMusicSetupFile'] = 'supabase/shared_music.sql'
              path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
      - name: Install dependencies
        run: npm ci
      - name: Build production bundle
        run: npm run build
      - name: Audit shared music access model
        shell: bash
        run: |
          set -euo pipefail
          grep -q "canManageSharedMusic" src/components/GlobalMusicPlayer.jsx
          grep -q "uploadAndShareMusic" src/components/GlobalMusicPlayer.jsx
          grep -q "subscribeSharedMusic" src/components/GlobalMusicPlayer.jsx
          grep -q "isAdminRole" src/utils/sharedMusic.js
          grep -q "supabase.storage.from(BUCKET).upload" src/utils/sharedMusic.js
          grep -q "postgres_changes" src/utils/sharedMusic.js
          grep -q "Admins can upload shared music" supabase/shared_music.sql
          grep -q "Approved users can listen to shared music" supabase/shared_music.sql
          if grep -q "DEFAULT_MUSIC_URL\|trackMode\|createObjectURL" src/components/GlobalMusicPlayer.jsx; then
            echo "Legacy local music source controls remain in GlobalMusicPlayer.jsx"
            exit 1
          fi
          test -f dist/index.html
      - name: Commit verified implementation
        shell: bash
        run: |
          rm -f .github/workflows/verify-shared-background-music.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add Admin-synced shared background music"
          git push origin HEAD:agent/admin-shared-background-music-20260724
