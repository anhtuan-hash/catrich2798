name: Brian premium UI foundation check

on:
  push:
    branches:
      - 'feature/global-shell-navigation-notifications-*'
    paths:
      - 'src/components/GlobalFlatNavigation.jsx'
      - 'src/components/GlobalFlatNavigation.css'
      - 'src/components/StatusMenuBar.jsx'
      - 'src/components/TransferInboxBanner.jsx'
      - 'src/pages/Home.jsx'
      - 'src/pages/HomePremium.css'
      - 'src/styles/brian-premium-tokens.css'
      - 'src/utils/globalNotifications.js'
      - 'docs/design/BRIAN-PREMIUM-UI-BLUEPRINT.md'
      - 'tests/e2e/global-shell.spec.js'
      - '.github/workflows/global-shell-check.yml'
  pull_request:
    paths:
      - 'src/components/GlobalFlatNavigation.jsx'
      - 'src/components/GlobalFlatNavigation.css'
      - 'src/components/StatusMenuBar.jsx'
      - 'src/components/TransferInboxBanner.jsx'
      - 'src/pages/Home.jsx'
      - 'src/pages/HomePremium.css'
      - 'src/styles/brian-premium-tokens.css'
      - 'src/utils/globalNotifications.js'
      - 'docs/design/BRIAN-PREMIUM-UI-BLUEPRINT.md'
      - 'tests/e2e/global-shell.spec.js'
      - '.github/workflows/global-shell-check.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-browser-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify premium UI contracts
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const component = fs.readFileSync('src/components/GlobalFlatNavigation.jsx', 'utf8');
          const styles = fs.readFileSync('src/components/GlobalFlatNavigation.css', 'utf8');
          const status = fs.readFileSync('src/components/StatusMenuBar.jsx', 'utf8');
          const notifications = fs.readFileSync('src/utils/globalNotifications.js', 'utf8');
          const transfer = fs.readFileSync('src/components/TransferInboxBanner.jsx', 'utf8');
          const home = fs.readFileSync('src/pages/Home.jsx', 'utf8');
          const homeStyles = fs.readFileSync('src/pages/HomePremium.css', 'utf8');
          const tokens = fs.readFileSync('src/styles/brian-premium-tokens.css', 'utf8');
          const blueprint = fs.readFileSync('docs/design/BRIAN-PREMIUM-UI-BLUEPRINT.md', 'utf8');
          const browserTest = fs.readFileSync('tests/e2e/global-shell.spec.js', 'utf8');

          const requiredComponentTokens = [
            'brian-global-shell',
            'brian-shell-menu-content',
            'brian-shell-notification-content',
            'bes-global-notification',
            'bes:notification',
            'bes-command-palette-open',
            'notificationState.key !== storageKey',
            'resolveSafeNotificationTarget',
            'aria-modal="true"',
          ];
          const requiredStyleTokens = [
            '.brian-global-shell',
            '.brian-shell-menu-grid',
            '.brian-shell-notification-list',
            'var(--bp-container)',
            '@media (max-width: 560px)',
          ];
          const requiredHomeTokens = [
            'bp-home-hero',
            'bp-tools-grid',
            'bp-overview-section',
            'WorkDashboard',
            'lesson-plan-ai',
            'reading-studio',
            'exam-studio',
          ];
          const requiredHomeStyleTokens = [
            '.bp-home-hero',
            '.bp-tool-card',
            '.bp-overview-grid',
            'grid-template-columns: repeat(5',
            '@media (max-width: 680px)',
          ];
          const requiredDesignTokens = [
            '--bp-bg',
            '--bp-primary',
            '--bp-container',
            '--bp-radius-xl',
            '--bp-shadow-lg',
          ];
          const requiredNotificationTokens = [
            'publishGlobalNotification',
            'publishGlobalNotificationOnce',
            'openGlobalNotificationCenter',
            'bes-global-notification',
          ];
          const requiredTransferTokens = [
            'publishGlobalNotificationOnce',
            'transfer:${identity}:${next.id}',
            'notificationTarget',
          ];
          const requiredBrowserTokens = [
            'shell-user-a',
            'shell-user-b',
            'javascript:window.__unsafeNotificationExecuted=true',
            'document.documentElement.scrollWidth <= window.innerWidth + 1',
          ];

          for (const token of requiredComponentTokens) if (!component.includes(token)) throw new Error(`Missing component contract: ${token}`);
          for (const token of requiredStyleTokens) if (!styles.includes(token)) throw new Error(`Missing shell style contract: ${token}`);
          for (const token of requiredHomeTokens) if (!home.includes(token)) throw new Error(`Missing homepage contract: ${token}`);
          for (const token of requiredHomeStyleTokens) if (!homeStyles.includes(token)) throw new Error(`Missing homepage style contract: ${token}`);
          for (const token of requiredDesignTokens) if (!tokens.includes(token)) throw new Error(`Missing design token: ${token}`);
          for (const token of requiredNotificationTokens) if (!notifications.includes(token)) throw new Error(`Missing notification contract: ${token}`);
          for (const token of requiredTransferTokens) if (!transfer.includes(token)) throw new Error(`Missing transfer notification contract: ${token}`);
          for (const token of requiredBrowserTokens) if (!browserTest.includes(token)) throw new Error(`Missing browser smoke contract: ${token}`);
          if (!status.includes('return null')) throw new Error('Duplicate StatusMenuBar was not retired');
          if (!blueprint.includes('Current boundary')) throw new Error('Premium UI migration boundary is undocumented');
          console.log('Brian premium UI foundation contracts passed.');
          NODE

      - name: Build Brian
        run: npm run build

      - name: Install WebKit browser
        run: npx playwright install --with-deps webkit

      - name: Run global shell browser smoke tests
        run: npx playwright test tests/e2e/global-shell.spec.js --project=webkit-desktop
