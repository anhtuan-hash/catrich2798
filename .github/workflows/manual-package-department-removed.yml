name: Package Department-removed Brian build

on:
  push:
    branches:
      - manual/department-removed-package
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-clean-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout clean package branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Audit complete application removal
        run: node scripts/remove-department-completely.mjs

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Create source and static ZIP packages
        shell: bash
        run: |
          git archive --format=zip --output=Brian-English-Studio-Department-Removed-source.zip HEAD
          cd dist
          zip -qr ../Brian-English-Studio-Department-Removed-static.zip .
          cd ..
          sha256sum Brian-English-Studio-Department-Removed-*.zip > SHA256SUMS.txt

      - name: Upload manual deployment package
        uses: actions/upload-artifact@v4
        with:
          name: Brian-English-Studio-Department-Removed
          path: |
            Brian-English-Studio-Department-Removed-source.zip
            Brian-English-Studio-Department-Removed-static.zip
            SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30
