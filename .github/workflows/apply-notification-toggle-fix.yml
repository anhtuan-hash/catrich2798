name: Apply visible notification toggle fix

on:
  push:
    branches:
      - feature/department-standalone-microfrontend
    paths:
      - .github/workflows/apply-notification-toggle-fix.yml

permissions:
  contents: write

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout standalone branch
        uses: actions/checkout@v4
        with:
          ref: feature/department-standalone-microfrontend
          fetch-depth: 0

      - name: Apply robust visible controls
        run: |
          python <<'PY'
          from pathlib import Path

          app_path = Path('department-app/src/App.jsx')
          app = app_path.read_text()

          old_close = '<button className="icon-button compact drawer-close" onClick={onClose} aria-label="Đóng thông báo"><Icon name="close" size={17}/></button>'
          new_close = '<button type="button" className="drawer-close-label" onClick={onClose} aria-label="Ẩn bảng thông báo"><span>Ẩn bảng</span><b aria-hidden="true">×</b></button>'
          if old_close not in app and new_close not in app:
              raise SystemExit('Notification close control marker not found')
          app = app.replace(old_close, new_close)

          old_meta = '<small>{unread} thông báo chưa đọc</small>'
          new_meta = '<small>{unread} thông báo chưa đọc · UI 1.4</small>'
          if old_meta in app:
              app = app.replace(old_meta, new_meta, 1)
          elif new_meta not in app:
              raise SystemExit('Notification meta marker not found')

          old_bell = '<button className="icon-button bell-button" onClick={() => setDrawerOpen((open) => !open)} aria-label="Mở thông báo">'
          new_bell = '<button type="button" className={`icon-button bell-button ${drawerOpen ? \'is-open\' : \'\'}`} onClick={() => setDrawerOpen((open) => !open)} aria-label={drawerOpen ? \'Đóng thông báo\' : \'Mở thông báo\'} title={drawerOpen ? \'Đóng bảng thông báo\' : \'Mở bảng thông báo\'}>'
          if old_bell not in app and new_bell not in app:
              raise SystemExit('Bell control marker not found')
          app = app.replace(old_bell, new_bell)
          app_path.write_text(app)

          main_path = Path('department-app/src/main.jsx')
          main = main_path.read_text()
          import_line = "import './notification-controls.css';"
          if import_line not in main:
              marker = "import './macbook-readable.css';"
              if marker not in main:
                  raise SystemExit('main.jsx style import marker not found')
              main = main.replace(marker, marker + '\n' + import_line)
              main_path.write_text(main)

          css_path = Path('department-app/src/notification-controls.css')
          css_path.write_text(r'''/* Explicit notification drawer controls. */
.drawer-head-actions {
  position: relative;
  z-index: 120;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
  pointer-events: auto !important;
}

.drawer-close-label {
  position: relative;
  z-index: 121;
  display: inline-flex !important;
  align-items: center;
  justify-content: center;
  gap: 7px;
  min-width: 104px;
  height: 38px;
  padding: 0 11px;
  border: 1px solid #cfc9ff;
  border-radius: 10px;
  background: #f1efff;
  color: #5945df;
  font-size: 12px;
  font-weight: 760;
  line-height: 1;
  cursor: pointer;
  pointer-events: auto !important;
  touch-action: manipulation;
  box-shadow: 0 5px 14px rgba(89, 69, 223, .10);
}

.drawer-close-label b {
  font-size: 21px;
  font-weight: 500;
  line-height: 1;
}

.drawer-close-label:hover,
.drawer-close-label:focus-visible {
  border-color: #7562f2;
  background: #e7e3ff;
  outline: 3px solid rgba(103, 85, 239, .16);
  outline-offset: 2px;
}

.notification-drawer {
  position: relative;
  z-index: 80;
  pointer-events: auto !important;
  animation: notification-panel-in 180ms ease-out both;
  transform-origin: top right;
}

.notification-drawer header,
.notification-list,
.notification-footer,
.notification-drawer button {
  pointer-events: auto !important;
}

.bell-button {
  position: relative;
  z-index: 90;
  pointer-events: auto !important;
  touch-action: manipulation;
}

.bell-button.is-open,
body:has(.notification-drawer) .bell-button {
  border-color: #bcb4ff;
  background: #f0edff;
  color: #6755ef;
  box-shadow: 0 6px 18px rgba(103, 85, 239, .14);
}

.workspace-grid.notifications-hidden .content-column {
  animation: notification-content-expand 180ms ease-out both;
}

@keyframes notification-panel-in {
  from { opacity: 0; transform: translateX(14px) scale(.985); }
  to { opacity: 1; transform: translateX(0) scale(1); }
}

@keyframes notification-content-expand {
  from { opacity: .92; }
  to { opacity: 1; }
}

@media (min-width: 1180px) and (max-width: 1720px) {
  .drawer-close-label {
    min-width: 112px;
    height: 42px;
    font-size: 13px;
  }
}

@media (prefers-reduced-motion: reduce) {
  .notification-drawer,
  .workspace-grid.notifications-hidden .content-column { animation: none; }
}
''')

          test_path = Path('department-app/tests/workspace.spec.js')
          test = test_path.read_text()
          test = test.replace("await expect(page.getByRole('button', { name: 'Đóng thông báo' })).toBeVisible();", "await expect(page.getByText('UI 1.4')).toBeVisible();\n  await expect(page.getByRole('button', { name: 'Ẩn bảng thông báo' })).toBeVisible();")
          test = test.replace("await page.getByRole('button', { name: 'Đóng thông báo' }).click();", "await page.getByRole('button', { name: 'Ẩn bảng thông báo' }).click();")
          test_path.write_text(test)
          PY

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: department-app/package.json

      - name: Install dependencies
        working-directory: department-app
        run: npm ci --no-audit --no-fund

      - name: Install Chromium
        working-directory: department-app
        run: npx playwright install --with-deps chromium

      - name: Test visible close and bell controls
        working-directory: department-app
        run: npm run test:e2e

      - name: Build standalone app
        working-directory: department-app
        run: npm run build

      - name: Commit verified fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add department-app/src/App.jsx department-app/src/main.jsx department-app/src/notification-controls.css department-app/tests/workspace.spec.js
          git diff --cached --quiet || git commit -m "Make notification drawer controls explicit and clickable"
          git push origin HEAD:feature/department-standalone-microfrontend
