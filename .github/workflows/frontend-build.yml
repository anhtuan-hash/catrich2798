name: Frontend Build

on:
  pull_request:
    paths:
      - 'src/**'
      - 'api/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.*'
      - '.github/workflows/frontend-build.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build production bundle
        run: npm run build
