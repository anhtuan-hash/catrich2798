name: Apply Department UI v2

on:
  push:
    branches:
      - feature/department-standalone-microfrontend
    paths:
      - .github/workflows/apply-department-ui-v2.yml
      - .github/department-ui-v2-payload/**
  pull_request:
    branches:
      - feature/department-new-known-good
    paths:
      - .github/workflows/apply-department-ui-v2.yml
      - .github/department-ui-v2-payload/**

permissions:
  contents: write

jobs:
  apply-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout standalone branch
        uses: actions/checkout@v4
        with:
          ref: feature/department-standalone-microfrontend
          fetch-depth: 0

      - name: Reconstruct UI v2 source
        run: |
          rm -rf /tmp/department-ui-v2
          mkdir -p /tmp/department-ui-v2
          cat .github/department-ui-v2-payload/part-*.txt | base64 --decode > /tmp/department-ui-v2.tar.gz
          tar -xzf /tmp/department-ui-v2.tar.gz -C /tmp/department-ui-v2
          test -f /tmp/department-ui-v2/src/App.jsx
          test -f /tmp/department-ui-v2/src/styles.css
          test -f /tmp/department-ui-v2/tests/workspace.spec.js
          cp /tmp/department-ui-v2/src/App.jsx department-app/src/App.jsx
          cp /tmp/department-ui-v2/src/main.jsx department-app/src/main.jsx
          cp /tmp/department-ui-v2/src/styles.css department-app/src/styles.css
          cp /tmp/department-ui-v2/package.json department-app/package.json
          cp /tmp/department-ui-v2/index.html department-app/index.html
          cp /tmp/department-ui-v2/vite.config.js department-app/vite.config.js
          cp /tmp/department-ui-v2/playwright.config.js department-app/playwright.config.js
          mkdir -p department-app/tests
          cp /tmp/department-ui-v2/tests/workspace.spec.js department-app/tests/workspace.spec.js
          python <<'PY'
          from pathlib import Path
          path = Path('department-app/tests/workspace.spec.js')
          text = path.read_text()
          text = text.replace(
              "  await page.getByRole('button', { name: /Tùy chọn Kiểm tra chức năng nhiệm vụ/ }).click();\n  await page.getByRole('button', { name: 'Hoàn thành' }).click();\n",
              "  const createdTask = page.getByTestId(/task-/).filter({ hasText: 'Kiểm tra chức năng nhiệm vụ' });\n  await createdTask.getByRole('button', { name: /Tùy chọn Kiểm tra chức năng nhiệm vụ/ }).click();\n  await createdTask.getByRole('button', { name: 'Hoàn thành', exact: true }).click();\n",
          )
          text = text.replace(
              "  await page.getByRole('button', { name: /Xây dựng ma trận/ }).click();\n",
              "  await page.locator('.search-results').getByRole('button', { name: /Xây dựng ma trận/ }).click();\n",
          )
          path.write_text(text)
          PY

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: department-app/package.json

      - name: Install dependencies
        working-directory: department-app
        run: npm install --no-audit --no-fund --silent

      - name: Build production bundle
        working-directory: department-app
        run: npm run build

      - name: Install Playwright Chromium
        working-directory: department-app
        run: npx playwright install --with-deps chromium >/tmp/playwright-install.log 2>&1

      - name: Run browser interaction tests
        id: e2e
        continue-on-error: true
        working-directory: department-app
        run: npm run test:e2e -- --reporter=json > playwright-results.json 2>&1

      - name: Upload Playwright diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: department-ui-v2-playwright
          path: |
            department-app/playwright-results.json
            department-app/test-results
          if-no-files-found: warn
          retention-days: 3

      - name: Verify visual and functional contract
        if: steps.e2e.outcome == 'success'
        run: |
          grep -q "min-height:640px" department-app/src/styles.css
          grep -q "department-v2-tasks" department-app/src/App.jsx
          grep -q "window.print" department-app/src/App.jsx
          grep -q "const createdTask" department-app/tests/workspace.spec.js
          test -f department-app/dist/index.html

      - name: Commit tested UI v2
        if: steps.e2e.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add department-app/src/App.jsx department-app/src/main.jsx department-app/src/styles.css department-app/package.json department-app/package-lock.json department-app/index.html department-app/vite.config.js department-app/playwright.config.js department-app/tests/workspace.spec.js
          git diff --cached --quiet || git commit -m "Rebuild standalone Department UI and validate interactions"
          git push origin HEAD:feature/department-standalone-microfrontend

      - name: Fail when browser tests fail
        if: steps.e2e.outcome != 'success'
        run: exit 1
