name: Cloudflare phase 0 inventory

on:
  pull_request:
    paths:
      - 'scripts/audit-supabase-phase0.mjs'
      - '.github/workflows/cloudflare-phase0-audit.yml'
      - 'src/**'
      - 'api/**'
      - 'supabase/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inventory:
    name: Read-only Supabase inventory
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Scan Supabase dependencies
        run: node scripts/audit-supabase-phase0.mjs

      - name: Upload phase 0 report
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-phase0-supabase-inventory
          path: artifacts/cloudflare-phase0/
          if-no-files-found: error
          retention-days: 30
