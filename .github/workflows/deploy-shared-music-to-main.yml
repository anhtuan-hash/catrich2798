name: Deploy shared music to latest main

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Apply shared music files to latest main
        shell: bash
        run: |
          git fetch origin agent/admin-shared-background-music-clean-20260724
          for path in \
            src/components/GlobalMusicPlayer.jsx \
            src/components/GlobalMusicShared.css \
            src/utils/sharedMusic.js \
            supabase/shared_music.sql
          do
            mkdir -p "$(dirname "$path")"
            git show origin/agent/admin-shared-background-music-clean-20260724:"$path" > "$path"
          done
          python3 <<'PY'
          from pathlib import Path
          import json
          for name in ('public/version.json', 'public/release-manifest.json'):
              path = Path(name)
              data = json.loads(path.read_text(encoding='utf-8'))
              data['sharedBackgroundMusic'] = True
              data['sharedBackgroundMusicAdminUpload'] = True
              data['sharedBackgroundMusicRealtime'] = True
              data['sharedBackgroundMusicTeacherReadOnly'] = True
              data['sharedBackgroundMusicSetupFile'] = 'supabase/shared_music.sql'
              path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Audit and push main
        shell: bash
        run: |
          set -euo pipefail
          grep -q "canManageSharedMusic" src/components/GlobalMusicPlayer.jsx
          grep -q "uploadAndShareMusic" src/components/GlobalMusicPlayer.jsx
          grep -q "subscribeSharedMusic" src/components/GlobalMusicPlayer.jsx
          grep -q "isAdminRole" src/utils/sharedMusic.js
          grep -q "supabase.storage.from(BUCKET).upload" src/utils/sharedMusic.js
          grep -q "postgres_changes" src/utils/sharedMusic.js
          grep -q "Admins can upload shared music" supabase/shared_music.sql
          grep -q "Approved users can listen to shared music" supabase/shared_music.sql
          if grep -q "DEFAULT_MUSIC_URL\|trackMode\|createObjectURL" src/components/GlobalMusicPlayer.jsx; then exit 1; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/version.json public/release-manifest.json src/components/GlobalMusicPlayer.jsx src/components/GlobalMusicShared.css src/utils/sharedMusic.js supabase/shared_music.sql
          git commit -m "Add Admin-synced shared background music"
          git push origin HEAD:main
