name: Department Workspace v3 rebuild

on:
  push:
    branches:
      - agent/department-v3-teachers

permissions:
  contents: write

jobs:
  rebuild:
    if: ${{ !contains(github.event.head_commit.message, '[generated-department-v3]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply integration
        run: python3 scripts/rebuild_department_v3.py
      - name: Install dependencies
        run: npm ci
      - name: Verify production build
        run: npm run build
      - name: Commit generated application
        run: |
          git config user.name "Brian Workspace Builder"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "Build Department Workspace v3 with teacher directory [generated-department-v3]"
          git push origin HEAD:agent/department-v3-teachers
