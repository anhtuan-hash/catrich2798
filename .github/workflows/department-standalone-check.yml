name: Department Standalone Check

on:
  push:
    branches:
      - feature/department-standalone-microfrontend
    paths:
      - department-app/**
      - .github/workflows/department-standalone-check.yml
  pull_request:
    branches:
      - feature/department-new-known-good
    paths:
      - department-app/**
      - .github/workflows/department-standalone-check.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: department-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && 'feature/department-standalone-microfrontend' || github.ref }}
          fetch-depth: 0

      - name: Apply verified UI integrations
        if: github.event_name == 'push'
        run: |
          python <<'PY'
          from pathlib import Path

          app_path = Path('src/App.jsx')
          app = app_path.read_text()

          # Keep the notification controls explicit and accessible.
          old_close = '<button className="icon-button compact drawer-close" onClick={onClose} aria-label="Đóng thông báo"><Icon name="close" size={17}/></button>'
          new_close = '<button type="button" className="drawer-close-label" onClick={onClose} aria-label="Ẩn bảng thông báo"><span>Ẩn bảng</span><b aria-hidden="true">×</b></button>'
          if old_close in app:
              app = app.replace(old_close, new_close, 1)
          elif new_close not in app:
              raise SystemExit('Notification close marker not found')

          old_meta = '<small>{unread} thông báo chưa đọc</small>'
          new_meta = '<small>{unread} thông báo chưa đọc · UI 1.4</small>'
          if old_meta in app:
              app = app.replace(old_meta, new_meta, 1)
          elif new_meta not in app:
              raise SystemExit('Notification version marker not found')

          old_bell = '<button className="icon-button bell-button" onClick={() => setDrawerOpen((open) => !open)} aria-label="Mở thông báo">'
          new_bell = '<button type="button" className={`icon-button bell-button ${drawerOpen ? \'is-open\' : \'\'}`} onClick={() => setDrawerOpen((open) => !open)} aria-label={drawerOpen ? \'Đóng thông báo\' : \'Mở thông báo\'} title={drawerOpen ? \'Đóng bảng thông báo\' : \'Mở bảng thông báo\'}>'
          if old_bell in app:
              app = app.replace(old_bell, new_bell, 1)
          elif new_bell not in app:
              raise SystemExit('Notification bell marker not found')

          # Replace the basic task page with the complete task workspace.
          task_import = "import TasksWorkspace from './TasksWorkspace.jsx';"
          react_import = "import React, { useEffect, useMemo, useRef, useState } from 'react';"
          if task_import not in app:
              if react_import not in app:
                  raise SystemExit('React import marker not found')
              app = app.replace(react_import, react_import + '\n' + task_import, 1)

          old_task_page = "tasks: <TasksPage tasks={tasks} onCreate={() => setModalType('task')} updateTask={updateTask} deleteTask={deleteTask}/>,"
          new_task_page = "tasks: <TasksWorkspace tasks={tasks} setTasks={setTasks} updateTask={updateTask} deleteTask={deleteTask} setToast={setToast}/>,"
          if old_task_page in app:
              app = app.replace(old_task_page, new_task_page, 1)
          elif new_task_page not in app:
              raise SystemExit('Task page mapping marker not found')
          app_path.write_text(app)

          main_path = Path('src/main.jsx')
          main = main_path.read_text()
          style_import = "import './notification-controls.css';"
          if style_import not in main:
              marker = "import './macbook-readable.css';"
              if marker not in main:
                  raise SystemExit('CSS import marker not found')
              main = main.replace(marker, marker + '\n' + style_import, 1)
              main_path.write_text(main)

          Path('src/notification-controls.css').write_text(r'''/* Explicit, visible notification controls. */
.drawer-head-actions{position:relative;z-index:120;display:flex;align-items:center;justify-content:flex-end;gap:10px;pointer-events:auto!important}
.drawer-close-label{position:relative;z-index:121;display:inline-flex!important;align-items:center;justify-content:center;gap:7px;min-width:104px;height:38px;padding:0 11px;border:1px solid #cfc9ff;border-radius:10px;background:#f1efff;color:#5945df;font-size:12px;font-weight:760;line-height:1;cursor:pointer;pointer-events:auto!important;touch-action:manipulation;box-shadow:0 5px 14px rgba(89,69,223,.10)}
.drawer-close-label b{font-size:21px;font-weight:500;line-height:1}
.drawer-close-label:hover,.drawer-close-label:focus-visible{border-color:#7562f2;background:#e7e3ff;outline:3px solid rgba(103,85,239,.16);outline-offset:2px}
.notification-drawer{position:relative;z-index:80;pointer-events:auto!important;animation:notification-panel-in 180ms ease-out both;transform-origin:top right}
.notification-drawer header,.notification-list,.notification-footer,.notification-drawer button{pointer-events:auto!important}
.bell-button{position:relative;z-index:90;pointer-events:auto!important;touch-action:manipulation}
.bell-button.is-open,body:has(.notification-drawer) .bell-button{border-color:#bcb4ff;background:#f0edff;color:#6755ef;box-shadow:0 6px 18px rgba(103,85,239,.14)}
.workspace-grid.notifications-hidden .content-column{animation:notification-content-expand 180ms ease-out both}
@keyframes notification-panel-in{from{opacity:0;transform:translateX(14px) scale(.985)}to{opacity:1;transform:translateX(0) scale(1)}}
@keyframes notification-content-expand{from{opacity:.92}to{opacity:1}}
@media(min-width:1180px) and (max-width:1720px){.drawer-close-label{min-width:112px;height:42px;font-size:13px}}
@media(prefers-reduced-motion:reduce){.notification-drawer,.workspace-grid.notifications-hidden .content-column{animation:none}}
''')

          test_path = Path('tests/workspace.spec.js')
          test = test_path.read_text()
          test = test.replace("await expect(page.getByRole('button', { name: 'Đóng thông báo' })).toBeVisible();", "await expect(page.getByText(/UI 1\\.4/)).toBeVisible();\n  await expect(page.getByRole('button', { name: 'Ẩn bảng thông báo' })).toBeVisible();")
          test = test.replace("await page.getByRole('button', { name: 'Đóng thông báo' }).click();", "await page.getByRole('button', { name: 'Ẩn bảng thông báo' }).click();")

          old_create = """test('creates and persists a task, filters and updates status', async ({ page }) => {
  await page.getByTestId('tab-tasks').click();
  await page.getByRole('button', { name: 'Tạo nhiệm vụ' }).click();
  await page.getByLabel('Tên nhiệm vụ').fill('Kiểm tra chức năng nhiệm vụ');
  await page.getByRole('button', { name: 'Lưu' }).click();
  await expect(page.getByText('Kiểm tra chức năng nhiệm vụ')).toBeVisible();
  await page.reload();
  await page.getByTestId('tab-tasks').click();
  await expect(page.getByText('Kiểm tra chức năng nhiệm vụ')).toBeVisible();
  const createdTask = page.getByTestId(/task-/).filter({ hasText: 'Kiểm tra chức năng nhiệm vụ' });
  await createdTask.getByRole('button', { name: /Tùy chọn Kiểm tra chức năng nhiệm vụ/ }).click();
  await createdTask.getByRole('button', { name: 'Hoàn thành', exact: true }).click();
  await expect(page.getByText('Hoàn thành').first()).toBeVisible();
});"""
          new_create = """test('creates and persists a task, filters and updates status', async ({ page }) => {
  await page.getByTestId('tab-tasks').click();
  await page.getByRole('button', { name: 'Tạo nhiệm vụ' }).click();
  const modal = page.getByTestId('task-editor-modal');
  await modal.getByLabel('Tên nhiệm vụ').fill('Kiểm tra chức năng nhiệm vụ');
  await modal.getByLabel('Mô tả chi tiết').fill('Kiểm tra lưu dữ liệu và cập nhật trạng thái.');
  await modal.getByRole('button', { name: 'Tạo nhiệm vụ' }).click();
  await expect(page.getByText('Kiểm tra chức năng nhiệm vụ')).toBeVisible();
  await page.reload();
  await page.getByTestId('tab-tasks').click();
  await expect(page.getByText('Kiểm tra chức năng nhiệm vụ')).toBeVisible();
  const createdTask = page.getByTestId(/task-/).filter({ hasText: 'Kiểm tra chức năng nhiệm vụ' });
  await createdTask.getByRole('button', { name: /Tùy chọn Kiểm tra chức năng nhiệm vụ/ }).click();
  await createdTask.getByRole('button', { name: 'Hoàn thành', exact: true }).click();
  await expect(createdTask.getByText('Hoàn thành')).toBeVisible();
});"""
          if old_create in test:
              test = test.replace(old_create, new_create, 1)
          elif new_create not in test:
              raise SystemExit('Existing task test marker not found')

          extended = """

test('complete task workspace supports assignment, search, details, feedback and editing', async ({ page }) => {
  await page.getByTestId('tab-tasks').click();
  await expect(page.getByRole('heading', { name: 'Giao việc và theo dõi' })).toBeVisible();
  await expect(page.getByText('Tổng nhiệm vụ')).toBeVisible();

  await page.getByRole('button', { name: 'Tạo nhiệm vụ' }).click();
  const modal = page.getByTestId('task-editor-modal');
  await modal.getByLabel('Tên nhiệm vụ').fill('Chuẩn bị chuyên đề chuyển đổi số');
  await modal.getByLabel('Mô tả chi tiết').fill('Hoàn thiện nội dung, minh chứng và tài liệu trình chiếu.');
  await modal.getByText('Nguyễn Thị Mai', { exact: true }).click();
  await modal.getByText('Trần Minh Đức', { exact: true }).click();
  await modal.getByLabel('Mức độ ưu tiên').selectOption('Cao');
  await modal.getByLabel('Trạng thái').selectOption('Đang thực hiện');
  await modal.getByLabel('Tiến độ nhiệm vụ').evaluate((element) => { element.value = '35'; element.dispatchEvent(new Event('input', { bubbles: true })); element.dispatchEvent(new Event('change', { bubbles: true })); });
  await modal.getByLabel('Tiêu chí hoàn thành').fill('Có kế hoạch chi tiết\\nCó tài liệu trình chiếu\\nCó minh chứng triển khai');
  await modal.locator('input[type=file]').setInputFiles({ name: 'ke-hoach.docx', mimeType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document', buffer: Buffer.from('demo') });
  await modal.getByRole('button', { name: 'Tạo nhiệm vụ' }).click();

  await page.getByLabel('Tìm nhiệm vụ').fill('chuyển đổi số');
  const task = page.getByTestId(/task-/).filter({ hasText: 'Chuẩn bị chuyên đề chuyển đổi số' });
  await expect(task).toBeVisible();
  await expect(task.getByText('Cao')).toBeVisible();
  await task.locator('.tw-task-main').click();

  const detail = page.getByTestId('task-detail-panel');
  await expect(detail.getByText('Nguyễn Thị Mai, Trần Minh Đức')).toBeVisible();
  await expect(detail.getByText('ke-hoach.docx')).toBeVisible();
  await detail.getByRole('checkbox').first().check();
  await detail.getByLabel('Nội dung phản hồi').fill('Vui lòng bổ sung thời lượng cho từng hoạt động.');
  await detail.getByRole('button', { name: 'Gửi phản hồi' }).click();
  await expect(detail.getByText('Vui lòng bổ sung thời lượng cho từng hoạt động.')).toBeVisible();

  await detail.getByRole('button', { name: 'Chỉnh sửa' }).click();
  const editModal = page.getByTestId('task-editor-modal');
  await editModal.getByLabel('Tên nhiệm vụ').fill('Chuẩn bị chuyên đề chuyển đổi số – hoàn chỉnh');
  await editModal.getByRole('button', { name: 'Lưu thay đổi' }).click();
  await expect(page.getByText('Chuẩn bị chuyên đề chuyển đổi số – hoàn chỉnh')).toBeVisible();

  await page.getByLabel('Lọc ưu tiên').selectOption('Cao');
  await expect(page.getByText('Chuẩn bị chuyên đề chuyển đổi số – hoàn chỉnh')).toBeVisible();
  await page.reload();
  await page.getByTestId('tab-tasks').click();
  await page.getByLabel('Tìm nhiệm vụ').fill('hoàn chỉnh');
  await expect(page.getByText('Chuẩn bị chuyên đề chuyển đổi số – hoàn chỉnh')).toBeVisible();
});
"""
          if "complete task workspace supports assignment" not in test:
              marker = "\ntest('notifications, search, meetings and record approval work'"
              if marker not in test:
                  raise SystemExit('Test insertion marker not found')
              test = test.replace(marker, extended + marker, 1)
          test_path.write_text(test)
          PY

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: department-app/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --silent

      - name: Build standalone app
        run: npm run build

      - name: Verify standalone contract
        run: |
          test -f dist/index.html
          grep -q "base: '/to-chuyen-mon/'" vite.config.js
          grep -q "TasksWorkspace" src/App.jsx
          grep -q "department-v2-tasks" src/App.jsx
          grep -q "window.print" src/App.jsx
          grep -q "Ẩn bảng" src/App.jsx
          grep -q "UI 1.4" src/App.jsx
          grep -q "notification-controls.css" src/main.jsx
          grep -q "complete task workspace supports assignment" tests/workspace.spec.js
          test -f src/TasksWorkspace.jsx
          test -f src/tasks-workspace.css

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium >/tmp/playwright-install.log 2>&1

      - name: Test real user interactions
        run: npm run test:e2e

      - name: Commit verified integrations
        if: github.event_name == 'push'
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add department-app/src/App.jsx department-app/src/main.jsx department-app/src/notification-controls.css department-app/tests/workspace.spec.js
          git diff --cached --quiet || git commit -m "Integrate complete task management workspace"
          git push origin HEAD:feature/department-standalone-microfrontend
