name: Department Standalone Check

on:
  push:
    branches:
      - feature/department-standalone-microfrontend
    paths:
      - department-app/**
      - .github/workflows/department-standalone-check.yml
  pull_request:
    branches:
      - feature/department-new-known-good
    paths:
      - department-app/**
      - .github/workflows/department-standalone-check.yml

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: department-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: department-app/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --silent

      - name: Build standalone app
        run: npm run build

      - name: Verify standalone visual contract
        run: |
          test -f dist/index.html
          grep -q "base: '/to-chuyen-mon/'" vite.config.js
          grep -q "workspace-grid" src/App.jsx
          grep -q "min-height:640px" src/styles.css
          grep -q "department-v2-tasks" src/App.jsx
          grep -q "window.print" src/App.jsx

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium >/tmp/playwright-install.log 2>&1

      - name: Test real user interactions
        run: npm run test:e2e
