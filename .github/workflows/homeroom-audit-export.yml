name: Homeroom Audit Source Export

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/homeroom-audit-hardening
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Package source
        run: |
          zip -qr homeroom-audit-source.zip . -x '.git/*' 'node_modules/*' 'dist/*'
      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: homeroom-audit-source
          path: homeroom-audit-source.zip
          retention-days: 2
