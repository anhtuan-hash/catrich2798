name: Apply Work Hub egress patch

on:
  push:
    branches:
      - fix/work-cloud-operations-egress
    paths:
      - .github/workflows/apply-work-egress.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/work-cloud-operations-egress
          fetch-depth: 0
      - name: Apply patch
        shell: bash
        env:
          PATCH_B64: 
        run: |
          printf '%s' "$PATCH_B64" | base64 -d | gzip -d > /tmp/work-egress.patch
          git apply --check /tmp/work-egress.patch
          git apply /tmp/work-egress.patch
          git rm .github/workflows/apply-work-egress.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/WorkHub.jsx src/utils/cloudOperations.js src/pages/CloudOperations.jsx src/pages/ProductionHardening.jsx
          git commit -m "Reduce Work Hub and cloud operations egress"
          git push origin HEAD:fix/work-cloud-operations-egress
