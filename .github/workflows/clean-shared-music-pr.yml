name: Clean shared music pull request

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/admin-shared-background-music-20260724
          fetch-depth: 0
      - name: Restore unrelated AI launcher files from main
        shell: bash
        run: |
          git fetch origin main
          git checkout origin/main -- src/components/GlobalAiWebsiteLauncher.jsx src/components/GlobalAiWebsiteLauncher.css
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Commit cleanup
        shell: bash
        run: |
          rm -f .github/workflows/clean-shared-music-pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Keep shared music PR focused"
          git push origin HEAD:agent/admin-shared-background-music-20260724
