name: Remove retired content apps

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  remove-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/remove-content-factory-lesson-pack-20260724
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Remove applications and active references
        run: python3 scripts/remove-retired-content-apps.py
      - name: Upload removal report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: retired-app-removal-report
          path: removal-report.txt
          if-no-files-found: ignore
      - name: Install dependencies
        run: npm ci
      - name: Build production bundle
        run: npm run build
      - name: Run permanent removal audit
        run: npm run audit:removed-apps
      - name: Commit verified removal
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove Content Factory and Lesson Pack completely"
          git push origin HEAD:agent/remove-content-factory-lesson-pack-20260724
