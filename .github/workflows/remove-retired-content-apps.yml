name: Remove retired content apps

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  remove-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/remove-content-factory-lesson-pack-20260724
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply removal-script hotfixes
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('scripts/remove-retired-content-apps.py')
          text = path.read_text(encoding='utf-8')
          old = '''profiles = read("src/data/designProfiles.js")
          profiles, removed = remove_flat_object(profiles, "'lesson-pack':")
          if not removed:
              raise RuntimeError("Lesson Pack design profile not found")
          write("src/data/designProfiles.js", profiles)'''
          new = '''profiles = read("src/data/designProfiles.js")
          profiles, removed = re.subn(r"\\n\\s*'lesson-pack':\\s*\\{.*?\\},", "", profiles, count=1, flags=re.S)
          if not removed:
              raise RuntimeError("Lesson Pack design profile not found")
          write("src/data/designProfiles.js", profiles)'''
          if old not in text:
              raise SystemExit('Expected design-profile block not found in removal script')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          python3 scripts/fix-removal-audit.py
      - name: Remove applications and active references
        run: python3 scripts/remove-retired-content-apps.py
      - name: Upload removal report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: retired-app-removal-report
          path: removal-report.txt
          if-no-files-found: ignore
      - name: Install dependencies
        run: npm ci
      - name: Build production bundle
        run: npm run build
      - name: Run dedicated removal audit
        shell: bash
        run: |
          set -o pipefail
          npm run audit:removed-content-apps 2>&1 | tee audit-report.txt
      - name: Upload audit report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: retired-app-audit-report
          path: audit-report.txt
          if-no-files-found: ignore
      - name: Commit verified removal
        shell: bash
        run: |
          rm -f audit-report.txt scripts/fix-removal-audit.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove Content Factory and Lesson Pack completely"
          git push origin HEAD:agent/remove-content-factory-lesson-pack-20260724
