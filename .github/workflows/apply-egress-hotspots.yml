name: Apply egress hotspot patch

on:
  push:
    branches:
      - fix/schedule-content-automation-egress
    paths:
      - .github/workflows/apply-egress-hotspots.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/schedule-content-automation-egress
          fetch-depth: 0
      - name: Apply patch
        shell: bash
        env:
          PATCH_B64: 
        run: |
          printf '%s' "$PATCH_B64" | base64 -d | gzip -d > /tmp/egress-hotspots.patch
          git apply --check /tmp/egress-hotspots.patch
          git apply /tmp/egress-hotspots.patch
          git rm .github/workflows/apply-egress-hotspots.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/GlobalWorkScheduleCenter.jsx src/utils/automationEngine.js src/pages/AutomationCenter.jsx src/pages/ContentEcosystem.jsx
          git commit -m "Reduce schedule, automation and content egress"
          git push origin HEAD:fix/schedule-content-automation-egress
