name: Department Workspace v2 Check

on:
  push:
    branches:
      - feature/department-v2-option-d
  pull_request:
    branches:
      - feature/department-new-known-good

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle and capture log
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm run build 2>&1 | tee build-output.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: department-v2-build-log
          path: build-output.log
          retention-days: 1

      - name: Verify faithful Option D workspace
        if: steps.build.outputs.exit_code == '0'
        run: |
          test -f src/pages/DepartmentWorkspaceV2.jsx
          test -f src/pages/DepartmentWorkspaceV2.css
          grep -q "dwD-shell" src/pages/DepartmentWorkspaceV2.jsx
          grep -q "position:fixed" src/pages/DepartmentWorkspaceV2.css
          grep -q "dwD-top-grid" src/pages/DepartmentWorkspaceV2.css
          grep -q "department-workspace" src/data/apps.js
          grep -q "DepartmentWorkspaceV2" src/pages/ToolPage.jsx

      - name: Fail when build failed
        if: steps.build.outputs.exit_code != '0'
        run: exit 1
