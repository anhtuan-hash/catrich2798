name: Restore exact unrelated files

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/admin-shared-background-music-20260724
          fetch-depth: 0
      - name: Restore exact base files
        shell: bash
        run: |
          git fetch origin 2622c9c41e0a5223a0c9a32ae34418793836f893
          git checkout 2622c9c41e0a5223a0c9a32ae34418793836f893 -- src/components/GlobalAiWebsiteLauncher.jsx src/components/GlobalAiWebsiteLauncher.css
          test "$(git hash-object src/components/GlobalAiWebsiteLauncher.jsx)" = "2a6f92cb8d7baee2dfa113d02cee6cf29117d399"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Commit exact restoration
        shell: bash
        run: |
          rm -f .github/workflows/restore-ai-launcher-exact.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Restore unrelated AI launcher files"
          git push origin HEAD:agent/admin-shared-background-music-20260724
